<div class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition border border-stone-100 flex flex-col">
  <div class="aspect-square bg-stone-100 overflow-hidden">
    {% if p.image %}
      <img src="{{ p.image.url }}" alt="{{ p.name }}" loading="lazy" class="w-full h-full object-cover">
    {% else %}
      <div class="w-full h-full flex items-center justify-center text-stone-400 text-5xl">🏛️</div>
    {% endif %}
  </div>
  <div class="p-4 flex flex-col flex-1">
    <p class="text-[10px] uppercase tracking-wider text-amber-700">{{ p.get_category_display }}</p>
    <h3 class="font-semibold text-stone-900 mt-1 line-clamp-2">{{ p.name }}</h3>
    <a href="{{ p.whatsapp_url }}" target="_blank" rel="noopener"
       class="mt-auto pt-3">
      <span class="block text-center bg-green-500 hover:bg-green-600 text-white text-sm font-semibold py-2 rounded-lg">Enquire on WhatsApp</span>
    </a>
  </div>
</div>
